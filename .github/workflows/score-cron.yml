name: Score Live Picks hourly

# Free, near-real-time scoring during the tournament — no paid Vercel plan needed.
# Every hour (June & July, the World Cup window) this pings the app's existing,
# password-protected scoring endpoint, which pulls fresh results from the football
# provider and recomputes the leaderboard. Scoring is idempotent, so running it
# often is completely safe.
#
# Setup (one time):
#   1. In Vercel, set the CRON_SECRET env var to a strong value and REDEPLOY.
#      (This also secures the built-in daily Vercel cron.)
#   2. In GitHub → repo Settings → Secrets and variables → Actions → New
#      repository secret, add CRON_SECRET with the SAME value.
#   3. (Optional) Test it now: Actions tab → "Score Live Picks hourly" →
#      Run workflow. A green check means it scored successfully.
#
# After the tournament you can delete this file (or just leave it — it only runs
# in June/July).

on:
  schedule:
    - cron: "0 * * 6,7 *" # top of every hour, June & July
  workflow_dispatch: {} # manual "Run workflow" button for testing

concurrency:
  group: score-cron
  cancel-in-progress: false

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - name: Score + send due reminder emails
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repo secret is not set in GitHub (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          BASE="https://lafamilia-mundial.vercel.app"

          ping() {
            # $1 = label, $2 = path
            code=$(curl -sS -o /tmp/body.txt -w "%{http_code}" -X GET \
              -H "Authorization: Bearer $CRON_SECRET" "$BASE$2")
            echo "[$1] HTTP $code — $(cat /tmp/body.txt)"
            case "$code" in
              200) echo "✅ $1 ok" ;;
              401) echo "::error::$1: 401 Unauthorized — CRON_SECRET in GitHub doesn't match Vercel, or Vercel wasn't redeployed."; return 1 ;;
              404) echo "::error::$1: 404 — wrong URL or not deployed yet."; return 1 ;;
              *)   echo "::error::$1: returned HTTP $code."; return 1 ;;
            esac
          }

          # Score first, then fire any due reminder emails. Both are idempotent,
          # so running hourly is safe (reminders also no-op until RESEND is set).
          ping "score" "/api/cron/score"
          ping "reminders" "/api/cron/reminders"
